spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://db:5432/chatdb
    username: chatuser
    password: chatpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "super-secret-key-that-is-at-least-256-bits-long-for-hmac-sha"
    expiration-ms: 86400000

server:
  port: 8080

file:
  upload-dir: /uploads